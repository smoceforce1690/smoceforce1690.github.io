<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три Кота Хоккей — PRO ELO</title>
<link href="https://api.fontshare.com/v2/css?f[]=chillax@400,600,700&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
:root {
  --bg: #0f0d1e; --surface: #1a162e; --surface-light: #252041; --border: #2d284d;
  --text: #ffffff; --muted: #a19db5; --accent: #ff7e47; --win: #4ade80; --lose: #f87171; --fire: #ff4500;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'General Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
.app { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 15px; }
.card { background: var(--surface); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h4 { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 1.5px; margin-bottom: 12px; }

input { background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; width: 100%; margin: 8px 0; text-align: center; font-size: 18px; outline: none; }
.btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 10px; }

/* Кастомизация профиля */
.elo-val { font-size: 45px; font-weight: 700; color: var(--accent); text-align: center; display: block; font-family: 'Chillax'; line-height: 1; }
.streak-fire { color: var(--fire); font-weight: 800; font-size: 14px; margin-left: 5px; text-shadow: 0 0 10px var(--fire); }
.hero-badge { background: var(--surface-light); padding: 4px 10px; border-radius: 8px; font-size: 11px; color: var(--muted); border: 1px solid var(--border); }

.lb-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; }
.hidden { display: none !important; }

/* Команды */
.team-setup { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
.hero-item {
  background: var(--surface-light); border: 1px solid var(--border);
  padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 8px;
  cursor: pointer; transition: 0.2s; font-size: 13px;
}
.hero-item.selected { border-color: var(--accent); background: rgba(255, 126, 71, 0.15); }
.avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; color: white; }

/* Админка */
.admin-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div class="app">
    <div id="auth-screen" class="card">
        <h2 style="font-family:'Chillax'; margin-bottom:20px;">PRO ELO LOGIN</h2>
        <input type="text" id="nick" placeholder="Никнейм">
        <input type="password" id="pass" placeholder="Пароль">
        <div id="hours-block" class="hidden"><input type="number" id="hours" placeholder="Часы в игре"></div>
        <button class="btn" onclick="handleAuth()">Войти</button>
        <p id="status" style="font-size: 11px; margin-top: 15px; color: var(--muted); text-align: center;"></p>
    </div>

    <div id="main-screen" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 10px;">
                <h2 id="u-nick" style="font-family:'Chillax'">...</h2>
                <button onclick="location.reload()" style="color:var(--lose); font-size:10px; border:none; background:none; cursor:pointer; font-weight:bold;">ВЫХОД</button>
            </div>
            
            <div style="text-align:center;">
                <span id="u-streak-display" class="streak-fire hidden">🔥 0 SERIES</span>
                <span class="elo-val" id="u-elo">0</span>
            </div>

            <div style="display:flex; justify-content:center; gap:10px; margin-top:15px;" id="u-fav-heroes">
                </div>
        </div>

        <div id="game-card" class="card">
            <div class="team-setup">
                <div class="hero-list" style="display:flex;flex-direction:column;gap:8px;">
                    <h4>Твоя Команда</h4>
                    <div class="hero-item my-h" onclick="selectHero('my', 'Боня', this)"><div class="avatar" style="background:#ff4d94">Б</div>Боня</div>
                    <div class="hero-item my-h" onclick="selectHero('my', 'Карамелька', this)"><div class="avatar" style="background:#ffbc42">К</div>Карамелька</div>
                </div>
                <div class="hero-list" style="display:flex;flex-direction:column;gap:8px;">
                    <h4>Противник</h4>
                    <div class="hero-item en-h" onclick="selectHero('en', 'Коржик', this)"><div class="avatar" style="background:#4c8cff">К</div>Коржик</div>
                    <div class="hero-item en-h" onclick="selectHero('en', 'Компот', this)"><div class="avatar" style="background:#4ade80">К</div>Компот</div>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="sc-my" placeholder="Твой счет">
                <input type="number" id="sc-en" placeholder="Их счет">
            </div>
            <button class="btn" onclick="saveMatch()">Записать результат</button>
        </div>

        <div id="admin-panel" class="card hidden">
            <h4 style="color:var(--accent)">Панель Админа</h4>
            <div id="admin-list"></div>
        </div>

        <div class="card">
            <h4>🏆 Топ Игроков</h4>
            <div id="leaderboard"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0iZzGjiytJwrY79im3vTCzUveWIejQ9U",
  authDomain: "elokotiki.firebaseapp.com",
  databaseURL: "https://elokotiki-default-rtdb.firebaseio.com",
  projectId: "elokotiki",
  storageBucket: "elokotiki.firebasestorage.app",
  messagingSenderId: "600976686920",
  appId: "1:600976686920:web:89191dcde00d5aa098bd7d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let me = null;
let selMy = null, selEn = null;

async function handleAuth() {
    const nick = document.getElementById('nick').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if(!nick || !pass) return;

    if(nick.toLowerCase() === 'admin') {
        if(pass === '123') { me = { nickname: 'admin', isAdmin: true }; startApp(); return; }
        else { alert("Ник admin защищен!"); return; }
    }

    const snap = await db.ref('players/' + nick).once('value');
    const data = snap.val();

    if(data) {
        if(data.isBanned) return alert("БАН!");
        if(data.pass === pass) { me = data; startApp(); }
        else alert("Пароль неверный!");
    } else {
        const h = document.getElementById('hours').value;
        if(!h) { document.getElementById('hours-block').classList.remove('hidden'); return; }
        me = { nickname: nick, pass: pass, elo: 0, hours: h, matches: 0, streak: 0, favs: {}, isBanned: false };
        await db.ref('players/' + nick).set(me);
        startApp();
    }
}

function selectHero(side, name, el) {
    document.querySelectorAll(side === 'my' ? '.my-h' : '.en-h').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    if(side === 'my') selMy = name; else selEn = name;
}

function startApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
    if(me.isAdmin) document.getElementById('admin-panel').classList.remove('hidden');

    db.ref('players').on('value', snap => {
        const players = snap.val() || {};
        if(!me.isAdmin) {
            const myData = players[me.nickname];
            if(!myData || myData.isBanned) location.reload();
            
            document.getElementById('u-nick').innerText = myData.nickname;
            document.getElementById('u-elo').innerText = myData.elo;
            
            // Серия побед
            const streakEl = document.getElementById('u-streak-display');
            if(myData.streak >= 2) {
                streakEl.innerText = `🔥 ${myData.streak} ПОБЕД ПОДРЯД`;
                streakEl.classList.remove('hidden');
            } else { streakEl.classList.add('hidden'); }

            // Любимые герои
            const favs = myData.favs || {};
            const topFavs = Object.entries(favs).sort((a,b) => b[1] - a[1]).slice(0, 2);
            document.getElementById('u-fav-heroes').innerHTML = topFavs.map(f => `<span class="hero-badge">⭐ ${f[0]}</span>`).join('');
            
            me = myData;
        } else {
            renderAdmin(players);
        }
        renderLeaderboard(players);
    });
}

async function saveMatch() {
    const s1 = parseInt(document.getElementById('sc-my').value);
    const s2 = parseInt(document.getElementById('sc-en').value);
    if(!selMy || isNaN(s1) || isNaN(s2)) return alert("Заполни данные!");

    let isWin = s1 > s2;
    let eloChange = isWin ? 25 : -15;
    
    // Расчет новой серии
    let newStreak = isWin ? (me.streak || 0) + 1 : 0;
    
    // Расчет любимых героев
    let newFavs = me.favs || {};
    newFavs[selMy] = (newFavs[selMy] || 0) + 1;

    await db.ref('players/' + me.nickname).update({
        elo: (me.elo || 0) + eloChange,
        streak: newStreak,
        favs: newFavs,
        matches: (me.matches || 0) + 1
    });

    alert(isWin ? "Победа! +" + eloChange : "Поражение! " + eloChange);
    document.getElementById('sc-my').value = ""; document.getElementById('sc-en').value = "";
}

function renderLeaderboard(players) {
    const sorted = Object.values(players).filter(p => !p.isBanned && p.nickname !== 'admin').sort((a,b) => b.elo - a.elo);
    document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => `
        <div class="lb-item">
            <span><b>#${i+1}</b> ${p.nickname} ${p.streak >= 3 ? '<span style="color:var(--fire)">🔥</span>' : ''}</span>
            <span style="font-weight:bold; color:var(--win)">${p.elo}</span>
        </div>
    `).join('');
}

function renderAdmin(players) {
    const list = document.getElementById('admin-list');
    list.innerHTML = Object.keys(players).map(n => {
        if(n === 'admin') return '';
        const p = players[n];
        return `
            <div class="admin-row">
                <span style="font-size:12px;">${n}</span>
                <button onclick="db.ref('players/${n}').update({isBanned: ${!p.isBanned}})" 
                style="background:${p.isBanned ? 'var(--win)' : 'var(--lose)'}; color:white; border:none; padding:5px; border-radius:5px; font-size:10px; cursor:pointer;">
                ${p.isBanned ? 'РАЗБАН' : 'БАН'}</button>
            </div>
        `;
    }).join('');
}
</script>
</body>
</html>
