<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три Кота Хоккей — PRO ELO</title>
<link href="https://api.fontshare.com/v2/css?f[]=chillax@400,600,700&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
:root {
  --bg: #0f0d1e; --surface: #1a162e; --surface-light: #252041; --border: #2d284d;
  --text: #ffffff; --muted: #a19db5; --accent: #ff7e47; --win: #4ade80; --lose: #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'General Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
.app { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 15px; }
.card { background: var(--surface); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h4 { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 1.5px; margin-bottom: 12px; }

/* Команды */
.team-setup { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.hero-list { display: flex; flex-direction: column; gap: 8px; }
.hero-item {
  background: var(--surface-light); border: 1px solid var(--border);
  padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: 0.2s; font-size: 14px;
}
.hero-item.selected { border-color: var(--accent); background: rgba(255, 126, 71, 0.15); }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: white; }

input { background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; width: 100%; margin: 8px 0; text-align: center; font-size: 18px; }
.btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 10px; }
.btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

.elo-val { font-size: 40px; font-weight: 700; color: var(--accent); text-align: center; display: block; font-family: 'Chillax'; }
.lb-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
    <div id="auth-screen" class="card">
        <h2 style="font-family:'Chillax'; margin-bottom:20px;">Вход в PRO ELO</h2>
        <input type="text" id="nick" placeholder="Никнейм">
        <input type="password" id="pass" placeholder="Пароль">
        <div id="hours-block" class="hidden"><input type="number" id="hours" placeholder="Часы в игре"></div>
        <button class="btn" onclick="handleAuth()">Войти</button>
        <p id="status" style="font-size: 11px; margin-top: 15px; color: var(--muted); text-align: center;"></p>
    </div>

    <div id="main-screen" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items: center;">
                <h2 id="u-nick" style="font-family:'Chillax'">...</h2>
                <button onclick="location.reload()" style="color:var(--lose); font-size:10px; font-weight:800;">ВЫХОД</button>
            </div>
            <span class="elo-val" id="u-elo">0</span>
            <div style="display:flex; justify-content:center; gap:20px; font-size:12px; color:var(--muted); margin-top:10px;">
                <span>ИГР: <b id="u-matches" style="color:#fff">0</b></span>
                <span>ЧАСОВ: <b id="u-hours" style="color:#fff">0</b></span>
            </div>
        </div>

        <div class="card">
            <div class="team-setup">
                <div class="hero-list">
                    <h4>Команда 1</h4>
                    <div class="hero-item my-h" onclick="selectHero('my', 'Боня', this)"><div class="avatar" style="background:#ff4d94">Б</div>Боня</div>
                    <div class="hero-item my-h" onclick="selectHero('my', 'Карамелька', this)"><div class="avatar" style="background:#ffbc42">К</div>Карамелька</div>
                </div>
                <div class="hero-list">
                    <h4>Команда 2</h4>
                    <div class="hero-item en-h" onclick="selectHero('en', 'Коржик', this)"><div class="avatar" style="background:#4c8cff">К</div>Коржик</div>
                    <div class="hero-item en-h" onclick="selectHero('en', 'Компот', this)"><div class="avatar" style="background:#4ade80">К</div>Компот</div>
                </div>
            </div>

            <div style="display:flex; gap:15px; align-items:center;">
                <div style="flex:1"><small style="color:var(--muted)">Счёт (К1)</small><input type="number" id="sc-my" placeholder="0"></div>
                <div style="padding-top:15px; font-weight:bold">:</div>
                <div style="flex:1"><small style="color:var(--muted)">Счёт (К2)</small><input type="number" id="sc-en" placeholder="0"></div>
            </div>
            <button class="btn" onclick="saveMatch()">Сохранить результат</button>
        </div>

        <div class="card">
            <h4>🏆 Глобальный Рейтинг</h4>
            <div id="leaderboard">Загрузка...</div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0iZzGjiytJwrY79im3vTCzUveWIejQ9U",
  authDomain: "elokotiki.firebaseapp.com",
  databaseURL: "https://elokotiki-default-rtdb.firebaseio.com",
  projectId: "elokotiki",
  storageBucket: "elokotiki.firebasestorage.app",
  messagingSenderId: "600976686920",
  appId: "1:600976686920:web:89191dcde00d5aa098bd7d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUser = null;
let myH = null, enH = null;

async function handleAuth() {
    const nick = document.getElementById('nick').value.trim();
    const pass = document.getElementById('pass').value.trim();
    const hrs = document.getElementById('hours').value;
    if (!nick || !pass) return;

    const snap = await db.ref('players/' + nick).once('value');
    const data = snap.val();

    if (data) {
        if (data.pass === pass) { currentUser = data; startApp(); }
        else { document.getElementById('status').innerText = "❌ Неверный пароль!"; }
    } else {
        const hrsBlock = document.getElementById('hours-block');
        if (hrsBlock.classList.contains('hidden')) {
            hrsBlock.classList.remove('hidden');
            document.getElementById('status').innerText = "Новый игрок! Укажи часы.";
        } else {
            if (!hrs) return;
            currentUser = { nickname: nick, pass: pass, elo: 0, hours: hrs, matches: 0 };
            await db.ref('players/' + nick).set(currentUser);
            startApp();
        }
    }
}

function selectHero(side, name, el) {
    const cls = side === 'my' ? '.my-h' : '.en-h';
    document.querySelectorAll(cls).forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    if(side === 'my') myH = name; else enH = name;
}

function startApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
    db.ref('players').on('value', (snap) => {
        const players = snap.val();
        if (!players) return;
        const me = players[currentUser.nickname];
        document.getElementById('u-nick').innerText = me.nickname;
        document.getElementById('u-elo').innerText = me.elo.toLocaleString();
        document.getElementById('u-hours').innerText = me.hours;
        document.getElementById('u-matches').innerText = me.matches;
        currentUser = me;

        const arr = Object.values(players).sort((a,b) => b.elo - a.elo);
        document.getElementById('leaderboard').innerHTML = arr.map((p, i) => `
            <div class="lb-item">
                <span><b style="color:var(--accent); margin-right:8px;">#${i+1}</b> ${p.nickname}</span>
                <span style="font-weight:700; color:${p.elo < 0 ? 'var(--lose)' : 'var(--win)'}">${p.elo}</span>
            </div>
        `).join('');
    });
}

async function saveMatch() {
    const myS = parseInt(document.getElementById('sc-my').value);
    const enS = parseInt(document.getElementById('sc-en').value);
    if (!myH || !enH) return alert("Выбери героев команд!");
    if (!((myS === 5 && enS < 5) || (enS === 5 && myS < 5))) return alert("Счёт до 5!");

    let diff = myS === 5 ? {0:50, 1:40, 2:30, 3:20, 4:10}[enS] : {0:-50, 1:-40, 2:-30, 3:-20, 4:-10}[myS];

    await db.ref('players/' + currentUser.nickname).update({
        elo: (currentUser.elo || 0) + diff,
        matches: (currentUser.matches || 0) + 1
    });

    document.getElementById('sc-my').value = ""; document.getElementById('sc-en').value = "";
    document.querySelectorAll('.hero-item').forEach(i => i.classList.remove('selected'));
    myH = null; enH = null;
    alert("Сохранено!");
}
</script>
</body>
</html>
