<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три Кота Хоккей — PRO ELO</title>
<link href="https://api.fontshare.com/v2/css?f[]=chillax@400,600,700&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
:root {
  --bg: #0f0d1e; --surface: #1a162e; --surface-light: #252041; --border: #2d284d;
  --text: #ffffff; --muted: #a19db5; --accent: #ff7e47; --win: #4ade80; --lose: #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'General Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
.app { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 15px; }
.card { background: var(--surface); border-radius: 24px; padding: 22px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h4 { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 1.5px; margin-bottom: 12px; }

input { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; width: 100%; margin: 5px 0; text-align: center; font-size: 16px; outline: none; }
.btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 10px; }
.btn-small { padding: 8px 12px; font-size: 11px; width: auto; margin: 0; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
.btn-ban-appeal { background: var(--lose); color: white; padding: 10px; border-radius: 10px; margin-top: 15px; width: 100%; cursor: pointer; border: none; font-weight: bold; }

.elo-display { font-size: 48px; font-weight: 700; color: var(--accent); text-align: center; font-family: 'Chillax'; display: block; }
.admin-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.hidden { display: none !important; }

/* Стиль для сообщения о бане */
.ban-msg { background: rgba(248, 113, 113, 0.1); border: 1px solid var(--lose); padding: 15px; border-radius: 15px; text-align: center; margin-top: 15px; }
</style>
</head>
<body>

<div class="app">
    <div id="auth-screen" class="card">
        <h2 style="font-family:'Chillax'; margin-bottom:20px;">PRO ELO</h2>
        <div id="auth-fields">
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="password" id="pass" placeholder="Пароль">
            <div id="hours-block" class="hidden"><input type="number" id="hours" placeholder="Часы в игре"></div>
            <button class="btn" onclick="handleAuth()">Войти</button>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" onclick="showResetRequest()" style="color: var(--muted); font-size: 12px; text-decoration: none;">Забыл пароль?</a>
            </div>
        </div>

        <div id="ban-screen" class="hidden">
            <div class="ban-msg">
                <h3 style="color: var(--lose); margin-bottom: 5px;">ДОСТУП ОГРАНИЧЕН</h3>
                <p style="font-size: 12px; color: var(--muted);">Ваш аккаунт был заблокирован за нарушение правил.</p>
                <button class="btn-ban-appeal" id="appeal-btn" onclick="sendAppeal()">РАЗЖАЛОВАТЬ (АПЕЛЛЯЦИЯ)</button>
            </div>
            <button class="btn" style="background: var(--surface-light); font-size: 12px;" onclick="location.reload()">Назад</button>
        </div>

        <p id="status" style="font-size: 11px; margin-top: 10px; color: var(--muted); text-align: center;"></p>
    </div>

    <div id="main-screen" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items: center;">
                <h2 id="u-nick">...</h2>
                <button onclick="location.reload()" style="color:var(--lose); font-size:10px; border:none; background:none; cursor:pointer; font-weight:800;">ВЫХОД</button>
            </div>
            <span class="elo-display" id="u-elo">0</span>
        </div>

        <div id="admin-panel" class="card hidden">
            <h4 style="color:var(--accent)">Запросы (Пароли / Бан)</h4>
            <div id="request-list">Запросов нет</div>
            <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
            <h4>Список всех игроков</h4>
            <div id="admin-list"></div>
        </div>

        <div class="card">
            <h4>🏆 Рейтинг</h4>
            <div id="leaderboard"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0iZzGjiytJwrY79im3vTCzUveWIejQ9U",
  authDomain: "elokotiki.firebaseapp.com",
  databaseURL: "https://elokotiki-default-rtdb.firebaseio.com",
  projectId: "elokotiki",
  storageBucket: "elokotiki.firebasestorage.app",
  messagingSenderId: "600976686920",
  appId: "1:600976686920:web:89191dcde00d5aa098bd7d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let me = null;
let currentBannedNick = "";

async function handleAuth() {
    const nick = document.getElementById('nick').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if(!nick) return;

    // Вход для админов
    if ((nick === 'admin' && pass === '123') || (nick === 'defaultuser05' && pass === '123')) {
        me = { nickname: nick, isAdmin: true };
        startApp(); return;
    }

    const snap = await db.ref('players/' + nick).once('value');
    const data = snap.val();

    if(data) {
        if(data.isBanned) {
            currentBannedNick = nick;
            document.getElementById('auth-fields').classList.add('hidden');
            document.getElementById('ban-screen').classList.remove('hidden');
            return;
        }
        if(data.pass === pass) { me = data; startApp(); }
        else alert("Неверный пароль!");
    } else {
        const hrs = document.getElementById('hours').value;
        if(!hrs) { document.getElementById('hours-block').classList.remove('hidden'); return; }
        me = { nickname: nick, pass: pass, elo: 0, hours: hrs, isBanned: false };
        await db.ref('players/' + nick).set(me);
        startApp();
    }
}

// ФУНКЦИЯ РАЗЖАЛОВАНИЯ
async function sendAppeal() {
    if(!currentBannedNick) return;
    await db.ref('requests/' + currentBannedNick).set({
        nickname: currentBannedNick,
        type: 'APPEAL',
        time: new Date().toLocaleTimeString()
    });
    document.getElementById('appeal-btn').innerText = "ОЖИДАЙТЕ РЕШЕНИЯ...";
    document.getElementById('appeal-btn').disabled = true;
    document.getElementById('appeal-btn').style.opacity = "0.5";
    alert("Запрос на разжалование отправлен админу defaultuser05!");
}

async function showResetRequest() {
    const n = document.getElementById('nick').value;
    if(!n) return alert("Введи ник!");
    await db.ref('requests/' + n).set({ nickname: n, type: 'PASSWORD' });
    alert("Запрос на сброс пароля отправлен!");
}

function startApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
    
    if(me.isAdmin) {
        document.getElementById('admin-panel').classList.remove('hidden');
        listenToAdminData();
    }

    db.ref('players').on('value', snap => {
        const players = snap.val() || {};
        if(!me.isAdmin) {
            const d = players[me.nickname];
            if(d.isBanned) location.reload();
            document.getElementById('u-nick').innerText = d.nickname;
            document.getElementById('u-elo').innerText = d.elo;
            me = d;
        } else {
            document.getElementById('u-nick').innerText = "ADMIN: " + me.nickname;
            renderAdminList(players);
        }
        renderLeaderboard(players);
    });
}

function listenToAdminData() {
    db.ref('requests').on('value', snap => {
        const reqs = snap.val();
        const cont = document.getElementById('request-list');
        if(!reqs) { cont.innerText = "Запросов нет"; return; }
        
        cont.innerHTML = Object.keys(reqs).map(n => {
            const r = reqs[n];
            const isAppeal = r.type === 'APPEAL';
            return `
                <div class="admin-row">
                    <span style="font-size:11px;">
                        <b style="color:${isAppeal ? 'var(--lose)' : 'var(--win)'}">${isAppeal ? '[АПЕЛЛЯЦИЯ]' : '[ПАРОЛЬ]'}</b> ${n}
                    </span>
                    <button class="btn-small" style="background:var(--win)" onclick="handleRequest('${n}', '${r.type}')">ОДОБРИТЬ</button>
                </div>
            `;
        }).join('');
    });
}

async function handleRequest(n, type) {
    if(type === 'APPEAL') {
        await db.ref('players/' + n).update({ isBanned: false });
    } else {
        await db.ref('players/' + n).update({ pass: "12345" });
    }
    await db.ref('requests/' + n).remove();
    alert("Действие выполнено!");
}

function renderLeaderboard(players) {
    const sorted = Object.values(players).filter(p => !p.isBanned && p.nickname !== 'admin').sort((a,b) => b.elo - a.elo);
    document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => `
        <div class="admin-row"><span>#${i+1} ${p.nickname}</span> <b style="color:var(--win)">${p.elo}</b></div>
    `).join('');
}

function renderAdminList(players) {
    const list = document.getElementById('admin-list');
    list.innerHTML = Object.keys(players).map(n => {
        if(n === 'admin' || n === 'defaultuser05') return '';
        const p = players[n];
        return `
            <div class="admin-row">
                <div style="font-size:11px;"><b>${n}</b><br>PW: ${p.pass}</div>
                <button onclick="db.ref('players/${n}').update({isBanned: ${!p.isBanned}})" class="btn-small" style="background:${p.isBanned ? 'var(--win)' : 'var(--lose)'}">
                ${p.isBanned ? 'РАЗБАН' : 'БАН'}</button>
            </div>
        `;
    }).join('');
}
</script>
</body>
</html>
