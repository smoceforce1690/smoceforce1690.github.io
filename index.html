<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три Кота Хоккей — PRO ELO</title>
<link href="https://api.fontshare.com/v2/css?f[]=chillax@400,600,700&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
:root {
  --bg: #0f0d1e; --surface: #1a162e; --surface-light: #252041; --border: #2d284d;
  --text: #ffffff; --muted: #a19db5; --accent: #ff7e47; --win: #4ade80; --lose: #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'General Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
.app { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 15px; }
.card { background: var(--surface); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
h4 { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 1.5px; margin-bottom: 12px; }

input { background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; width: 100%; margin: 8px 0; text-align: center; font-size: 18px; outline: none; transition: 0.3s; }
input:focus { border-color: var(--accent); }
.btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 10px; }
.btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-small { padding: 8px 12px; font-size: 11px; width: auto; margin: 0; border-radius: 8px; }

.hidden { display: none !important; }
.admin-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.request-item { background: rgba(255, 126, 71, 0.1); border: 1px dashed var(--accent); padding: 10px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

/* Стили для смены пароля */
.settings-link { color: var(--muted); font-size: 11px; cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }
#change-pass-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<div class="app">
    <div id="auth-screen" class="card">
        <h2 style="font-family:'Chillax'; margin-bottom:20px;">PRO ELO</h2>
        <input type="text" id="nick" placeholder="Никнейм">
        <input type="password" id="pass" placeholder="Пароль">
        <div id="hours-block" class="hidden"><input type="number" id="hours" placeholder="Часы в игре"></div>
        
        <button class="btn" onclick="handleAuth()">Войти</button>
        
        <div style="text-align: center; margin-top: 15px;">
            <a href="#" onclick="showResetRequest()" style="color: var(--muted); font-size: 12px; text-decoration: none;">Забыл пароль?</a>
        </div>
        <p id="status" style="font-size: 11px; margin-top: 15px; color: var(--muted); text-align: center;"></p>
    </div>

    <div id="main-screen" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items: center;">
                <h2 id="u-nick">...</h2>
                <button onclick="location.reload()" style="color:var(--lose); font-size:10px; border:none; background:none; cursor:pointer; font-weight: 800;">ВЫХОД</button>
            </div>
            <h1 id="u-elo" style="text-align:center; font-size:48px; color:var(--accent); font-family:'Chillax'">0</h1>
            
            <div style="text-align: center;" id="player-settings">
                <span class="settings-link" onclick="togglePassBox()">Изменить пароль для защиты</span>
                <div id="change-pass-box" class="hidden">
                    <input type="password" id="new-pass-val" placeholder="Новый пароль" style="font-size: 14px; padding: 10px;">
                    <button class="btn btn-small" onclick="selfChangePass()">Сохранить</button>
                </div>
            </div>
        </div>

        <div id="admin-panel" class="card hidden">
            <h4 style="color:var(--accent)">Запросы на сброс</h4>
            <div id="reset-list">Нет запросов</div>
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
            <h4>База игроков</h4>
            <div id="admin-list"></div>
        </div>

        <div class="card">
            <h4>🏆 Рейтинг</h4>
            <div id="leaderboard"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0iZzGjiytJwrY79im3vTCzUveWIejQ9U",
  authDomain: "elokotiki.firebaseapp.com",
  databaseURL: "https://elokotiki-default-rtdb.firebaseio.com",
  projectId: "elokotiki",
  storageBucket: "elokotiki.firebasestorage.app",
  messagingSenderId: "600976686920",
  appId: "1:600976686920:web:89191dcde00d5aa098bd7d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let me = null;

async function handleAuth() {
    const nick = document.getElementById('nick').value.trim();
    const pass = document.getElementById('pass').value.trim();
    const status = document.getElementById('status');
    
    if(!nick || !pass) return;

    // Админы: admin и defaultuser05
    if ((nick === 'admin' && pass === '123') || (nick === 'defaultuser05' && pass === '123')) {
        me = { nickname: nick, isAdmin: true };
        startApp();
        return;
    }

    const snap = await db.ref('players/' + nick).once('value');
    const data = snap.val();

    if(data) {
        if(data.isBanned) { status.innerText = "⛔ Вы забанены!"; return; }
        if(data.pass === pass) { me = data; startApp(); }
        else status.innerText = "❌ Неверный пароль!";
    } else {
        const h = document.getElementById('hours').value;
        if(!h) { document.getElementById('hours-block').classList.remove('hidden'); return; }
        me = { nickname: nick, pass: pass, elo: 0, hours: h, isBanned: false };
        await db.ref('players/' + nick).set(me);
        startApp();
    }
}

function togglePassBox() {
    document.getElementById('change-pass-box').classList.toggle('hidden');
}

async function selfChangePass() {
    const newPass = document.getElementById('new-pass-val').value.trim();
    if(newPass.length < 3) return alert("Пароль слишком короткий!");
    
    await db.ref('players/' + me.nickname).update({ pass: newPass });
    alert("Пароль успешно изменен! Запомните его.");
    togglePassBox();
}

function showResetRequest() {
    const nick = document.getElementById('nick').value.trim();
    if(!nick) return alert("Сначала введи свой ник!");
    
    db.ref('reset_requests/' + nick).set({ nickname: nick, time: new Date().toLocaleTimeString() });
    alert("Запрос отправлен админу defaultuser05!");
}

function startApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
    
    if(me.isAdmin) {
        document.getElementById('admin-panel').classList.remove('hidden');
        document.getElementById('player-settings').classList.add('hidden');
        listenToRequests();
    }

    db.ref('players').on('value', snap => {
        const players = snap.val() || {};
        if(!me.isAdmin) {
            const d = players[me.nickname];
            if(d.isBanned) location.reload();
            document.getElementById('u-nick').innerText = d.nickname;
            document.getElementById('u-elo').innerText = d.elo;
            me = d;
        } else {
            document.getElementById('u-nick').innerText = "ADMIN: " + me.nickname;
            renderAdmin(players);
        }
        renderLeaderboard(players);
    });
}

function listenToRequests() {
    db.ref('reset_requests').on('value', snap => {
        const reqs = snap.val();
        const cont = document.getElementById('reset-list');
        if(!reqs) { cont.innerText = "Нет запросов"; return; }
        cont.innerHTML = Object.keys(reqs).map(n => `
            <div class="request-item">
                <span><b>${n}</b> забыл пароль</span>
                <button class="btn btn-small" style="background:var(--win)" onclick="approveReset('${n}')">СБРОС (12345)</button>
            </div>
        `).join('');
    });
}

async function approveReset(nick) {
    await db.ref('players/' + nick).update({ pass: "12345" });
    await db.ref('reset_requests/' + nick).remove();
    alert("Готово! Новый пароль игрока: 12345");
}

function renderLeaderboard(players) {
    const sorted = Object.values(players).filter(p => !p.isBanned && p.nickname !== 'admin').sort((a,b) => b.elo - a.elo);
    document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => `
        <div class="admin-row">
            <span>#${i+1} ${p.nickname}</span>
            <span style="color:var(--win); font-weight:bold;">${p.elo}</span>
        </div>
    `).join('');
}

function renderAdmin(players) {
    const list = document.getElementById('admin-list');
    list.innerHTML = Object.keys(players).map(n => {
        if(n === 'admin' || n === 'defaultuser05') return '';
        const p = players[n];
        return `
            <div class="admin-row">
                <div style="font-size:12px;">
                    <b>${n}</b><br>
                    <span style="color:var(--muted)">PW: ${p.pass}</span>
                </div>
                <div style="display:flex; gap:5px;">
                    <button onclick="db.ref('players/${n}').update({isBanned: ${!p.isBanned}})" class="btn btn-small" 
                    style="background:${p.isBanned ? 'var(--win)' : 'var(--lose)'}">
                    ${p.isBanned ? 'РАЗБАН' : 'БАН'}</button>
                </div>
            </div>
        `;
    }).join('');
}
</script>
</body>
</html>
