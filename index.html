<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три Кота Хоккей — PRO ELO</title>
<link href="https://api.fontshare.com/v2/css?f[]=chillax@400,600,700&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
:root {
  --bg: #0f0d1e; --surface: #1a162e; --surface-light: #252041; --border: #2d284d;
  --text: #ffffff; --muted: #a19db5; --accent: #ff7e47; --win: #4ade80; --lose: #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'General Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
.app { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 15px; }
.card { background: var(--surface); border-radius: 24px; padding: 22px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h4 { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 1.5px; margin-bottom: 12px; }

input { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; width: 100%; margin: 5px 0; text-align: center; font-size: 16px; outline: none; }
.btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 10px; }
.btn-small { padding: 8px 12px; font-size: 11px; width: auto; margin: 0; border-radius: 8px; }

.elo-display { font-size: 48px; font-weight: 700; color: var(--accent); text-align: center; font-family: 'Chillax'; display: block; }
.hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
.hero-btn { background: var(--surface-light); border: 1px solid var(--border); padding: 10px; border-radius: 12px; cursor: pointer; text-align: center; font-size: 13px; transition: 0.2s; }
.hero-btn.selected { border-color: var(--accent); background: rgba(255,126,71,0.1); }

.admin-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.hidden { display: none !important; }
.settings-link { color: var(--muted); font-size: 11px; cursor: pointer; text-decoration: underline; display: block; text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<div class="app">
    <div id="auth-screen" class="card">
        <h2 style="font-family:'Chillax'; margin-bottom:20px;">PRO ELO</h2>
        <input type="text" id="nick" placeholder="Никнейм">
        <input type="password" id="pass" placeholder="Пароль">
        <div id="hours-block" class="hidden"><input type="number" id="hours" placeholder="Часы в игре"></div>
        <button class="btn" onclick="handleAuth()">Войти</button>
        <div style="text-align: center; margin-top: 15px;">
            <a href="#" onclick="showResetRequest()" style="color: var(--muted); font-size: 12px; text-decoration: none;">Забыл пароль?</a>
        </div>
        <p id="status" style="font-size: 11px; margin-top: 10px; color: var(--muted); text-align: center;"></p>
    </div>

    <div id="main-screen" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items: center;">
                <h2 id="u-nick">...</h2>
                <button onclick="location.reload()" style="color:var(--lose); font-size:10px; border:none; background:none; cursor:pointer; font-weight:800;">ВЫХОД</button>
            </div>
            <span class="elo-display" id="u-elo">0</span>
            <span class="settings-link" onclick="document.getElementById('ch-pass-box').classList.toggle('hidden')">Защитить аккаунт (смена пароля)</span>
            <div id="ch-pass-box" class="hidden" style="margin-top:10px;">
                <input type="password" id="new-p" placeholder="Новый паро heartль" style="font-size:13px;">
                <button class="btn btn-small" onclick="changeMyPass()">ОК</button>
            </div>
        </div>

        <div id="game-card" class="card">
            <div class="hero-grid">
                <div>
                    <h4>Твой герой</h4>
                    <div class="hero-btn my-h" onclick="selH('my','Боня',this)">Боня</div>
                    <div class="hero-btn my-h" onclick="selH('my','Карамелька',this)" style="margin-top:5px;">Карамелька</div>
                </div>
                <div>
                    <h4>Враг</h4>
                    <div class="hero-btn en-h" onclick="selH('en','Коржик',this)">Коржик</div>
                    <div class="hero-btn en-h" onclick="selH('en','Компот',this)" style="margin-top:5px;">Компот</div>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="s1" placeholder="Твой счёт">
                <input type="number" id="s2" placeholder="Их счёт">
            </div>
            <button class="btn" onclick="saveGame()">Сохранить результат</button>
        </div>

        <div id="admin-panel" class="card hidden">
            <h4 style="color:var(--accent)">Запросы на сброс пароля</h4>
            <div id="reset-list">Нет запросов</div>
            <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
            <h4>Игроки (Пароли и Бан)</h4>
            <div id="admin-list"></div>
        </div>

        <div class="card">
            <h4>🏆 Рейтинг</h4>
            <div id="leaderboard"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0iZzGjiytJwrY79im3vTCzUveWIejQ9U",
  authDomain: "elokotiki.firebaseapp.com",
  databaseURL: "https://elokotiki-default-rtdb.firebaseio.com",
  projectId: "elokotiki",
  storageBucket: "elokotiki.firebasestorage.app",
  messagingSenderId: "600976686920",
  appId: "1:600976686920:web:89191dcde00d5aa098bd7d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let me = null;
let h1 = null, h2 = null;

async function handleAuth() {
    const nick = document.getElementById('nick').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if(!nick) return;

    if ((nick === 'admin' && pass === '123') || (nick === 'defaultuser05' && pass === '123')) {
        me = { nickname: nick, isAdmin: true };
        startApp(); return;
    }

    const snap = await db.ref('players/' + nick).once('value');
    const data = snap.val();

    if(data) {
        if(data.isBanned) return alert("БАН!");
        if(data.pass === pass) { me = data; startApp(); }
        else alert("Неверный пароль!");
    } else {
        const hrs = document.getElementById('hours').value;
        if(!hrs) { document.getElementById('hours-block').classList.remove('hidden'); return; }
        me = { nickname: nick, pass: pass, elo: 0, hours: hrs, isBanned: false };
        await db.ref('players/' + nick).set(me);
        startApp();
    }
}

function selH(side, name, el) {
    document.querySelectorAll(side === 'my' ? '.my-h' : '.en-h').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    if(side === 'my') h1 = name; else h2 = name;
}

function startApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
    if(me.isAdmin) {
        document.getElementById('admin-panel').classList.remove('hidden');
        document.getElementById('game-card').classList.add('hidden');
    }

    db.ref('players').on('value', snap => {
        const players = snap.val() || {};
        if(!me.isAdmin) {
            const d = players[me.nickname];
            if(d.isBanned) location.reload();
            document.getElementById('u-nick').innerText = d.nickname;
            document.getElementById('u-elo').innerText = d.elo;
            me = d;
        } else {
            document.getElementById('u-nick').innerText = "ADMIN: " + me.nickname;
            renderAdmin(players);
        }
        renderLeaderboard(players);
    });

    if(me.isAdmin) {
        db.ref('reset_requests').on('value', snap => {
            const reqs = snap.val();
            const cont = document.getElementById('reset-list');
            if(!reqs) { cont.innerText = "Запросов нет"; return; }
            cont.innerHTML = Object.keys(reqs).map(n => `
                <div class="admin-row"><span>${n}</span> <button class="btn btn-small" onclick="approveReset('${n}')">СБРОС</button></div>
            `).join('');
        });
    }
}

async function saveGame() {
    const s1 = parseInt(document.getElementById('s1').value);
    const s2 = parseInt(document.getElementById('s2').value);
    if(!h1 || !h2 || isNaN(s1)) return alert("Выбери героев и счёт!");
    
    let diff = (s1 > s2) ? 25 : -15;
    await db.ref('players/' + me.nickname).update({ elo: (me.elo || 0) + diff });
    alert(s1 > s2 ? "Победа! +25" : "Поражение! -15");
}

async function changeMyPass() {
    const np = document.getElementById('new-p').value;
    if(np.length < 3) return;
    await db.ref('players/' + me.nickname).update({ pass: np });
    alert("Пароль изменён!");
}

function showResetRequest() {
    const n = document.getElementById('nick').value;
    if(!n) return alert("Введи ник!");
    db.ref('reset_requests/' + n).set({ nickname: n });
    alert("Запрос отправлен!");
}

async function approveReset(n) {
    await db.ref('players/' + n).update({ pass: "12345" });
    await db.ref('reset_requests/' + n).remove();
}

function renderLeaderboard(players) {
    const sorted = Object.values(players).filter(p => !p.isBanned && p.nickname !== 'admin').sort((a,b) => b.elo - a.elo);
    document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => `
        <div class="admin-row"><span>#${i+1} ${p.nickname}</span> <b style="color:var(--win)">${p.elo}</b></div>
    `).join('');
}

function renderAdmin(players) {
    const list = document.getElementById('admin-list');
    list.innerHTML = Object.keys(players).map(n => {
        if(n === 'admin' || n === 'defaultuser05') return '';
        const p = players[n];
        return `
            <div class="admin-row">
                <div style="font-size:11px;"><b>${n}</b><br>PW: ${p.pass} | ELO: ${p.elo}</div>
                <button onclick="db.ref('players/${n}').update({isBanned: ${!p.isBanned}})" class="btn btn-small" style="background:${p.isBanned ? 'var(--win)' : 'var(--lose)'}">
                ${p.isBanned ? 'РАЗБАН' : 'БАН'}</button>
            </div>
        `;
    }).join('');
}
</script>
</body>
</html>
